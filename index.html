<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#00e5ff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="JARVIS">
<meta name="mobile-web-app-capable" content="yes">
<title>JARVIS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap');
:root{--cyan:#00e5ff;--blue:#0077ff;--bg:#000d1a;--surface:rgba(0,229,255,0.05);--border:rgba(0,229,255,0.2);--text:#cce8ff;--dim:rgba(0,229,255,0.4)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:'Rajdhani',sans-serif;color:var(--text);display:flex;flex-direction:column;align-items:center;position:relative}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
body::after{content:'';position:fixed;bottom:-20%;left:50%;transform:translateX(-50%);width:80vw;height:80vw;background:radial-gradient(circle,rgba(0,119,255,0.15) 0%,transparent 70%);pointer-events:none;z-index:0}
.scanline{position:fixed;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);animation:scan 4s linear infinite;pointer-events:none;z-index:999;opacity:0.3}
@keyframes scan{0%{top:0}100%{top:100vh}}

/* API KEY SCREEN */
#apiScreen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;gap:20px}
.api-logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:32px;letter-spacing:8px;color:var(--cyan);text-shadow:0 0 20px rgba(0,229,255,0.8)}
.api-desc{text-align:center;font-size:14px;color:var(--dim);letter-spacing:0.5px;line-height:1.6}
.api-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;font-family:'Rajdhani',sans-serif;font-size:14px;color:var(--text);outline:none;letter-spacing:0.5px}
.api-input:focus{border-color:var(--cyan)}
.api-btn{width:100%;padding:14px;background:linear-gradient(135deg,rgba(0,229,255,0.2),rgba(0,119,255,0.2));border:1px solid var(--cyan);border-radius:12px;color:var(--cyan);font-family:'Orbitron',sans-serif;font-size:14px;letter-spacing:3px;cursor:pointer;transition:all 0.2s}
.api-btn:active{transform:scale(0.97);background:rgba(0,229,255,0.3)}
.api-note{font-size:11px;color:var(--dim);text-align:center;letter-spacing:0.3px}

.app{position:relative;z-index:1;width:100%;max-width:430px;height:100vh;height:100dvh;display:flex;flex-direction:column;padding:0 20px}
header{padding:18px 0 10px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:22px;letter-spacing:6px;color:var(--cyan);text-shadow:0 0 20px rgba(0,229,255,0.8)}
.status-dot{display:flex;align-items:center;gap:6px;font-size:11px;letter-spacing:2px;color:var(--dim)}
.dot{width:7px;height:7px;border-radius:50%;background:#00ff88;box-shadow:0 0 8px #00ff88;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8)}}
.reactor-wrapper{display:flex;justify-content:center;align-items:center;padding:24px 0 16px;flex-shrink:0}
.reactor{position:relative;width:160px;height:160px;cursor:pointer;-webkit-user-select:none;user-select:none}
.ring{position:absolute;inset:0;border-radius:50%;border:2px solid transparent}
.ring-1{border-color:var(--cyan);box-shadow:0 0 20px rgba(0,229,255,0.4),inset 0 0 20px rgba(0,229,255,0.1);animation:spin 8s linear infinite}
.ring-2{inset:12px;border-color:rgba(0,229,255,0.4);animation:spin-rev 5s linear infinite}
.ring-3{inset:24px;border-top-color:var(--blue);border-right-color:var(--blue);animation:spin 3s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes spin-rev{to{transform:rotate(-360deg)}}
.reactor-core{position:absolute;inset:36px;border-radius:50%;background:radial-gradient(circle at 40% 35%,rgba(0,229,255,0.3),rgba(0,119,255,0.15),transparent);border:1px solid rgba(0,229,255,0.5);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all 0.3s ease}
.reactor.listening .reactor-core{background:radial-gradient(circle at 40% 35%,rgba(0,255,136,0.3),rgba(0,229,255,0.2),transparent);border-color:#00ff88;box-shadow:0 0 30px rgba(0,255,136,0.3)}
.reactor.thinking .reactor-core{background:radial-gradient(circle at 40% 35%,rgba(255,200,0,0.3),rgba(0,119,255,0.2),transparent);animation:throb 0.6s ease-in-out infinite}
@keyframes throb{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.mic-icon{font-size:28px;margin-bottom:2px}
.core-label{font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:2px;color:var(--dim)}
.waveform{display:flex;align-items:center;justify-content:center;gap:3px;height:30px;margin:0 0 10px;flex-shrink:0}
.wave-bar{width:3px;background:var(--cyan);border-radius:2px;height:4px;transition:height 0.15s ease}
.wave-bar.active{animation:wave var(--d,0.8s) ease-in-out infinite alternate;animation-delay:var(--delay,0s)}
@keyframes wave{from{height:4px;opacity:0.4}to{height:var(--h,20px);opacity:1}}
.chat-area{flex:1;overflow-y:auto;padding:10px 0;display:flex;flex-direction:column;gap:12px;scrollbar-width:none}
.chat-area::-webkit-scrollbar{display:none}
.message{display:flex;gap:10px;animation:fadeUp 0.3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.message.user{flex-direction:row-reverse}
.avatar{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;background:var(--surface)}
.message.user .avatar{background:rgba(0,119,255,0.2);border-color:rgba(0,119,255,0.4)}
.bubble{max-width:78%;padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.55;font-weight:400;letter-spacing:0.3px}
.message.jarvis .bubble{background:var(--surface);border:1px solid var(--border);color:var(--text);border-top-left-radius:4px}
.message.user .bubble{background:rgba(0,119,255,0.2);border:1px solid rgba(0,119,255,0.4);color:#e0f0ff;border-top-right-radius:4px;text-align:right}
.time{font-size:10px;color:var(--dim);margin-top:4px;letter-spacing:1px}
.input-area{padding:12px 0 20px;display:flex;flex-direction:column;gap:10px;flex-shrink:0;border-top:1px solid var(--border)}
.text-row{display:flex;gap:10px;align-items:center}
.text-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:22px;padding:10px 16px;font-family:'Rajdhani',sans-serif;font-size:15px;color:var(--text);outline:none;transition:border-color 0.2s;letter-spacing:0.3px}
.text-input::placeholder{color:var(--dim)}
.text-input:focus{border-color:var(--cyan)}
.send-btn{width:42px;height:42px;border-radius:50%;background:rgba(0,119,255,0.3);border:1px solid rgba(0,119,255,0.6);color:var(--cyan);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0}
.send-btn:active{transform:scale(0.9);background:rgba(0,119,255,0.5)}
.bottom-row{display:flex;justify-content:space-between;align-items:center;padding:0 4px}
.mode-badge{font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:2px;color:var(--dim)}
.voice-btn{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,rgba(0,229,255,0.2),rgba(0,119,255,0.2));border:2px solid var(--cyan);color:var(--cyan);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.25s;box-shadow:0 0 16px rgba(0,229,255,0.3)}
.voice-btn.active{background:linear-gradient(135deg,rgba(0,255,136,0.3),rgba(0,229,255,0.2));border-color:#00ff88;box-shadow:0 0 24px rgba(0,255,136,0.5);animation:vpulse 1s ease-in-out infinite}
@keyframes vpulse{0%,100%{box-shadow:0 0 24px rgba(0,255,136,0.5)}50%{box-shadow:0 0 40px rgba(0,255,136,0.8)}}
.voice-btn:active{transform:scale(0.92)}
.clear-btn{font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:1px;color:var(--dim);background:none;border:1px solid var(--border);border-radius:20px;padding:5px 10px;cursor:pointer;transition:all 0.2s}
.clear-btn:active{color:var(--cyan);border-color:var(--cyan)}
.notice{text-align:center;font-size:11px;color:var(--dim);letter-spacing:1px;padding:4px 0}
.thinking-dots span{animation:blink 1.2s infinite}
.thinking-dots span:nth-child(2){animation-delay:0.2s}
.thinking-dots span:nth-child(3){animation-delay:0.4s}
@keyframes blink{0%,80%,100%{opacity:0.2}40%{opacity:1}}
</style>
</head>
<body>
<div class="scanline"></div>

<!-- API KEY SCREEN -->
<div id="apiScreen">
  <div class="api-logo">JARVIS</div>
  <div class="api-desc">Başlamak için Anthropic API anahtarınızı girin.<br>Anahtar sadece bu cihazda saklanır.</div>
  <input class="api-input" id="apiInput" type="password" placeholder="sk-ant-api03-..." autocomplete="off" autocorrect="off" spellcheck="false">
  <button class="api-btn" id="apiBtn">BAŞLAT</button>
  <div class="api-note">platform.anthropic.com adresinden ücretsiz alabilirsiniz.</div>
</div>

<!-- MAIN APP -->
<div class="app" id="mainApp" style="display:none">
  <header>
    <div class="logo">JARVIS</div>
    <div class="status-dot"><div class="dot"></div><span>ONLINE</span></div>
  </header>
  <div class="reactor-wrapper">
    <div class="reactor" id="reactor">
      <div class="ring ring-1"></div>
      <div class="ring ring-2"></div>
      <div class="ring ring-3"></div>
      <div class="reactor-core">
        <div class="mic-icon" id="coreIcon">🎙️</div>
        <div class="core-label" id="coreLabel">KONUŞMAK İÇİN DOKUN</div>
      </div>
    </div>
  </div>
  <div class="waveform" id="waveform"></div>
  <div class="chat-area" id="chat">
    <div class="message jarvis">
      <div class="avatar">🤖</div>
      <div>
        <div class="bubble">Merhaba! Ben JARVIS. Sesli veya yazılı konuşabilirsiniz. Nasıl yardımcı olabilirim?</div>
        <div class="time" id="initTime"></div>
      </div>
    </div>
  </div>
  <div class="input-area">
    <div class="text-row">
      <input class="text-input" id="textInput" placeholder="Mesaj yazın..." autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="send-btn" id="sendBtn">➤</button>
    </div>
    <div class="bottom-row">
      <button class="clear-btn" id="clearBtn">TEMİZLE</button>
      <button class="voice-btn" id="voiceBtn">🎙️</button>
      <div class="mode-badge" id="modeLabel">METİN MODU</div>
    </div>
    <div class="notice" id="notice"></div>
  </div>
</div>

<script>
let API_KEY = localStorage.getItem('jarvis_key') || '';
const SYSTEM = 'Sen JARVIS\'sın — Tony Stark\'ın yapay zeka asistanının Türkçe versiyonu. Zeki, hızlı, biraz alaycı ama her zaman yardımsever. Cevaplarını kısa ve öz ver. Ciddi sorulara ciddi, şaka sorulara esprili cevap ver.';

function getTime(){return new Date().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'})}
document.getElementById('initTime').textContent = getTime();

// API screen
if(API_KEY){document.getElementById('apiScreen').style.display='none';document.getElementById('mainApp').style.display='flex'}
document.getElementById('apiBtn').addEventListener('click',()=>{
  const k=document.getElementById('apiInput').value.trim();
  if(!k||!k.startsWith('sk-')){alert('Geçersiz anahtar! sk-ant- ile başlamalı.');return}
  localStorage.setItem('jarvis_key',k);
  API_KEY=k;
  document.getElementById('apiScreen').style.display='none';
  document.getElementById('mainApp').style.display='flex';
});

// Waveform
const wf=document.getElementById('waveform');
for(let i=0;i<20;i++){const b=document.createElement('div');b.className='wave-bar';const h=4+Math.random()*20;b.style.setProperty('--h',h+'px');b.style.setProperty('--d',(0.5+Math.random()*0.6)+'s');b.style.setProperty('--delay',(i*0.05)+'s');wf.appendChild(b)}
function setWave(on){wf.querySelectorAll('.wave-bar').forEach(b=>on?b.classList.add('active'):b.classList.remove('active'))}

let isListening=false,recognition=null,history=[];
const chat=document.getElementById('chat');
const reactor=document.getElementById('reactor');
const coreIcon=document.getElementById('coreIcon');
const coreLabel=document.getElementById('coreLabel');
const modeLabel=document.getElementById('modeLabel');
const notice=document.getElementById('notice');
const voiceBtn=document.getElementById('voiceBtn');

function addMsg(role,text){
  const d=document.createElement('div');
  d.className='message '+role;
  const isJ=role==='jarvis';
  d.innerHTML=`<div class="avatar">${isJ?'🤖':'👤'}</div><div><div class="bubble">${text}</div><div class="time">${getTime()}</div></div>`;
  chat.appendChild(d);chat.scrollTop=chat.scrollHeight;return d;
}
function addThinking(){
  const d=document.createElement('div');d.className='message jarvis';d.id='thinking';
  d.innerHTML='<div class="avatar">🤖</div><div><div class="bubble thinking-dots"><span>●</span><span>●</span><span>●</span></div></div>';
  chat.appendChild(d);chat.scrollTop=chat.scrollHeight;
}
function removeThinking(){const e=document.getElementById('thinking');if(e)e.remove()}

function setReactor(state){
  reactor.className='reactor '+state;
  if(state==='listening'){coreIcon.textContent='🔴';coreLabel.textContent='DİNLİYOR...';modeLabel.textContent='SES MODU'}
  else if(state==='thinking'){coreIcon.textContent='⚡';coreLabel.textContent='İŞLİYOR...'}
  else{coreIcon.textContent='🎙️';coreLabel.textContent='KONUŞMAK İÇİN DOKUN';modeLabel.textContent='METİN MODU'}
}

async function askJarvis(text){
  history.push({role:'user',content:text});
  setReactor('thinking');setWave(true);addThinking();
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':API_KEY,'anthropic-version':'2023-06-01'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:SYSTEM,messages:history})
    });
    const data=await r.json();
    removeThinking();setWave(false);setReactor('idle');
    if(data.content&&data.content[0]){
      const reply=data.content[0].text;
      history.push({role:'assistant',content:reply});
      addMsg('jarvis',reply);
      if('speechSynthesis' in window){const u=new SpeechSynthesisUtterance(reply);u.lang='tr-TR';u.rate=1.05;u.pitch=0.85;speechSynthesis.speak(u)}
    } else {
      addMsg('jarvis','Bir hata oluştu: '+(data.error?.message||'Bilinmeyen hata'));
    }
  }catch(e){removeThinking();setWave(false);setReactor('idle');addMsg('jarvis','Bağlantı hatası. İnternet bağlantınızı kontrol edin.')}
}

function setupRecognition(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){notice.textContent='⚠ Tarayıcınız ses tanımayı desteklemiyor.';return null}
  const r=new SR();r.lang='tr-TR';r.continuous=false;r.interimResults=false;
  r.onstart=()=>{isListening=true;setReactor('listening');setWave(true);voiceBtn.classList.add('active');voiceBtn.textContent='⏹️';notice.textContent='Sizi dinliyorum...'};
  r.onresult=e=>{const t=e.results[0][0].transcript;notice.textContent='';addMsg('user',t);askJarvis(t)};
  r.onerror=e=>{notice.textContent=e.error==='not-allowed'?'⚠ Mikrofon izni gerekiyor.':'⚠ Ses alınamadı.';stopListening()};
  r.onend=()=>stopListening();
  return r;
}
function stopListening(){isListening=false;setReactor('idle');setWave(false);voiceBtn.classList.remove('active');voiceBtn.textContent='🎙️';if(recognition)recognition.stop()}
function toggleVoice(){
  if(!recognition)recognition=setupRecognition();
  if(!recognition)return;
  if(isListening)recognition.stop();
  else try{recognition.start()}catch(e){}
}

reactor.addEventListener('click',toggleVoice);
voiceBtn.addEventListener('click',toggleVoice);

const textInput=document.getElementById('textInput');
document.getElementById('sendBtn').addEventListener('click',()=>{
  const t=textInput.value.trim();if(!t)return;textInput.value='';addMsg('user',t);askJarvis(t);
});
textInput.addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('sendBtn').click()});
document.getElementById('clearBtn').addEventListener('click',()=>{
  chat.innerHTML='';history=[];addMsg('jarvis','Bellek temizlendi. Yeni oturuma hazırım, efendim.');
});
recognition=setupRecognition();
</script>
</body>
</html>
